<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beatryx-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="256" cy="256" r="250" fill="url(#beatryx-gradient)" opacity="0.1"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#beatryx-gradient)" stroke-width="35" stroke-linecap="round"/>
  
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#beatryx-gradient)" stroke-width="30" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Music note stem -->
  <g>
    <!-- Vertical stem -->
    <line x1="256" y1="140" x2="256" y2="310" stroke="url(#beatryx-gradient)" stroke-width="32" stroke-linecap="round"/>
    
    <!-- Upper note head (accent) -->
    <circle cx="310" cy="200" r="38" fill="none" stroke="url(#beatryx-gradient)" stroke-width="28" opacity="0.6"/>
    
    <!-- Main note head -->
    <circle cx="220" cy="320" r="50" fill="url(#beatryx-gradient)"/>
    
    <!-- Note head outline -->
    <circle cx="220" cy="320" r="50" fill="none" stroke="url(#beatryx-gradient)" stroke-width="8" opacity="0.5"/>
    
    <!-- Inner highlight -->
    <circle cx="220" cy="320" r="25" fill="url(#beatryx-gradient)" opacity="0.3"/>
  </g>
</svg>
